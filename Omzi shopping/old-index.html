<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Omzi - Home</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:20px; background:#f9f9f9; }
        nav { margin-bottom:20px; }
        nav a { margin-right:15px; text-decoration:none; font-weight:bold; color:#333; }
        #search { padding:5px; width:200px; margin-bottom:20px; }
        #product-list { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
        .card { background:#fff; padding:15px; border-radius:8px; width:200px; box-shadow:0 2px 5px rgba(0,0,0,0.1); transition:0.3s; text-align:center; }
        .card:hover { transform:translateY(-5px); box-shadow:0 5px 15px rgba(0,0,0,0.2); }
        .card img { width:100%; height:180px; object-fit:cover; border-radius:5px; }
        .price { font-weight:bold; color:green; }
        .old-price { text-decoration:line-through; color:#999; margin-left:5px; font-size:0.9em; }
        .discount { color:red; font-weight:bold; margin-left:5px; font-size:0.9em; }
        button { padding:5px 10px; margin-top:5px; cursor:pointer; border:none; border-radius:5px; background:#333; color:#fff; }
        @media(max-width:600px){ #product-list{flex-direction:column; align-items:center;} .card{width:90%;} }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a> |
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
    </nav>

    <input type="text" id="search" placeholder="Search products...">
    <div id="product-list"></div>

    <script src="js/script.js"></script>
</body>
</html>
